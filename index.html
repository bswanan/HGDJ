<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>豪哥王者荣耀工作室大转盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei}
body{background:#f5f7fa;padding:20px}
.container{max-width:1200px;margin:0 auto;display:none;grid-template-columns:1fr;gap:20px}
/* 顶部标题样式 */
.wheel-title{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#d62828;
    letter-spacing:2px;
}
.wheel-box{display:flex;flex-direction:column;align-items:center}
.wrap{position:relative;width:400px;height:400px}
#canvas{width:100%;height:100%;border-radius:50%;box-shadow:0 0 0 8px #ff6b6b,0 0 30px rgba(255,107,107,0.4)}
.pointer{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;border-top:40px solid #ff3838;z-index:9}
#draw{margin-top:30px;padding:14px 50px;font-size:20px;background:linear-gradient(135deg,#ff4757,#ff6348);color:#fff;border:none;border-radius:50px;cursor:pointer}
#draw:disabled{background:#aaa;cursor:not-allowed}
.tip-text{margin-top:12px;color:#2385bb;font-size:16px}
/* 卡密弹窗 */
.key-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center}
.key-box{background:#fff;padding:40px 30px;border-radius:12px;text-align:center;width:340px}
.key-box h2{margin-bottom:20px;color:#333}
#keyInput{width:100%;font-size:20px;text-align:center;letter-spacing:6px;margin-bottom:15px;padding:8px}
#subKey{width:100%;padding:12px;font-size:18px;background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer}
.err{color:red;margin-top:10px;display:none}
/* 中奖弹窗 */
.win-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9998;align-items:center;justify-content:center}
.win-box{background:#fff;padding:40px 60px;border-radius:12px;text-align:center}
.win-box h2{font-size:28px;margin-bottom:20px;color:#ff4757}
#winName{font-size:22px;margin-bottom:15px;font-weight:bold}
.tip-send{font-size:16px;color:#333;margin-bottom:30px;line-height:1.6}
#newKeyBtn{padding:10px 25px;background:#007bff;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<!-- 卡密弹窗 -->
<div class="key-modal" id="keyModal">
    <div class="key-box">
        <h2>输入卡密获取抽奖机会</h2>
        <input type="text" id="keyInput" placeholder="6位数字卡密">
        <button id="subKey">验证卡密</button>
        <p class="err" id="keyErr">卡密无效或已使用！</p >
    </div>
</div>

<!-- 转盘主体 -->
<div class="container" id="mainBox">
    <!-- 轮盘上方标题 -->
    <h1 class="wheel-title">豪哥王者荣耀工作室大转盘</h1>
    <div class="wheel-box">
        <div class="wrap">
            <div class="pointer"></div>
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        <button id="draw">开始抽奖</button>
        <p class="tip-text">普通卡密只可抽奖一次，下单联系豪哥工作室获取卡密！</p >
    </div>
</div>

<!-- 中奖弹窗 -->
<div class="win-modal" id="winModal">
    <div class="win-box">
        <h2>恭喜中奖！</h2>
        <p id="winName"></p >
        <p class="tip-send">请将此抽奖结果截图发给客服为你安排</p >
        <button id="newKeyBtn">使用新卡密继续抽奖</button>
    </div>
</div>

<script>
// 普通单次卡密列表
const keyList = [
"159357","246801","357912","468123","579234","681345","792456","813567","924678","135789",
"246901","358012","469123","570234","681345","792456","813567","924678","135780","246891",
"357012","468129","579230","680341","791452","812563","923674","134785","245896","356907",
"467018","578129","689230","790341","811452","922563","133674","244785","355896","466907",
"577018","688129","799230","112233","223344","334455","445566","556677","667788","778899",
"121314","232425","343536","454647","565758","676869","787980","898091","909102","113355",
"224466","335577","446688","557799","122334","233445","344556","455667","566778","677889",
"151937","242801","353912","464123","575234","686345","797456","818567","929678","131789",
"242901","353012","464129","575230","686341","797452","818563","929674","131780","242891",
"987654","876543","765432","654321","543210","192837","283746","374659","465928","592817"
];
// 永久无限测试卡密
const testKey = "LZH";
const keyPrize = "wheelPrizeConfig";
const POINTER_OFFSET = -Math.PI / 2;

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const drawBtn = document.getElementById("draw");
const keyModal = document.getElementById("keyModal");
const keyInput = document.getElementById("keyInput");
const subKey = document.getElementById("subKey");
const keyErr = document.getElementById("keyErr");
const mainBox = document.getElementById("mainBox");
const winModal = document.getElementById("winModal");
const winName = document.getElementById("winName");
const newKeyBtn = document.getElementById("newKeyBtn");

let wheelAngle = 0;
let isRolling = false;
let currentKey = "";
let prizeData = [];

// 读取本地奖项配置
function loadPrize(){
    const str = localStorage.getItem(keyPrize);
    if(str){
        prizeData = JSON.parse(str);
    }else{
        prizeData = [
            {name:"英雄战力500",weight:30,color:"#ff6b6b"},
            {name:"段位5颗星",weight:20,color:"#ffd966"},
            {name:"随机区标",weight:10,color:"#69db7c"},
            {name:"随机市标",weight:5,color:"#74c0fc"},
            {name:"随机小国",weight:1,color:"#b197fc"},
            {name:"随机大国",weight:0,color:"#adb5bd"}
        ];
    }
    drawWheel();
}

// 获取已使用普通卡密
function getUsedKeys(){
    const d = localStorage.getItem("usedKeys");
    return d ? JSON.parse(d) : [];
}
// 仅普通卡密标记使用，LZH不记录
function markKeyUsed(k){
    if(k === testKey) return;
    const arr = getUsedKeys();
    arr.push(k);
    localStorage.setItem("usedKeys", JSON.stringify(arr));
}

// 返回卡密输入页
function reInputKey(){
    winModal.style.display = "none";
    currentKey = "";
    keyInput.value = "";
    keyErr.style.display = "none";
    keyModal.style.display = "flex";
}

// 绘制均等大小扇形转盘
function drawWheel(){
    const count = prizeData.length;
    const r = canvas.width / 2;
    const seg = Math.PI * 2 / count;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();
    ctx.translate(r,r);
    ctx.rotate(wheelAngle);
    let start = 0;
    prizeData.forEach(it=>{
        const end = start + seg;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0,r-8,start,end);
        ctx.closePath();
        ctx.fillStyle = it.color;
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.save();
        const mid = start + seg / 2;
        ctx.rotate(mid);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px Microsoft Yahei";
        ctx.textAlign = "center";
        ctx.fillText(it.name, r * 0.55, 8);
        ctx.restore();
        start = end;
    })
    ctx.restore();
}

// 抽奖逻辑，自动过滤权重0的大国
function doDraw(){
    if(isRolling) return;
    isRolling = true;
    drawBtn.disabled = true;
    // 过滤权重为0，无法抽出
    const validPrize = prizeData.filter(item => item.weight > 0);
    const total = validPrize.reduce((s,i)=>s+i.weight,0);
    let rnd = Math.random() * total;
    let hitIdx = 0;
    for(let i=0;i<validPrize.length;i++){
        rnd -= validPrize[i].weight;
        if(rnd <= 0){
            hitIdx = i;
            break;
        }
    }
    const targetItem = validPrize[hitIdx];
    const realIndex = prizeData.findIndex(p => p.name === targetItem.name);

    const seg = Math.PI * 2 / prizeData.length;
    const centerRad = realIndex * seg + seg / 2;
    const targetRad = Math.PI * 2 * 8 + (POINTER_OFFSET - centerRad);
    function animate(){
        if(!isRolling) return;
        const diff = targetRad - wheelAngle;
        if(Math.abs(diff) < 0.0005){
            wheelAngle = targetRad;
            drawWheel();
            isRolling = false;
            drawBtn.disabled = false;
            markKeyUsed(currentKey);
            winName.innerText = targetItem.name;
            winModal.style.display = "flex";
            return;
        }
        wheelAngle += diff * 0.04;
        drawWheel();
        requestAnimationFrame(animate);
    }
    animate();
}

// 卡密验证逻辑
keyInput.addEventListener("keydown",e=>{if(e.key==="Enter")subKey.click()})
subKey.onclick = ()=>{
    const input = keyInput.value.trim();
    const used = getUsedKeys();
    keyErr.style.display = "none";
    // 无限测试卡密直接放行
    if(input === testKey){
        currentKey = input;
        keyModal.style.display = "none";
        mainBox.style.display = "grid";
        loadPrize();
        return;
    }
    // 普通卡密校验
    if(!keyList.includes(input)){
        keyErr.innerText = "卡密不存在！";
        keyErr.style.display = "block";
        return;
    }
    if(used.includes(input)){
        keyErr.innerText = "该卡密已使用，请换新卡密！";
        keyErr.style.display = "block";
        return;
    }
    currentKey = input;
    keyModal.style.display = "none";
    mainBox.style.display = "grid";
    loadPrize();
}
drawBtn.onclick = doDraw;
newKeyBtn.onclick = reInputKey;

// 初始化加载奖项
loadPrize();
</script>
</body>
</html>
